---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canary
  template:
    metadata:
      labels:
        app: canary
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          args:
            - "--verbose"
            # - "--cert=/etc/tls/tls.crt"
            # - "--key=/etc/tls/tls.key"
            - "--port=80"
          env:
            - name: WHOAMI_NAME
              value: canary
          volumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
          ports:
            - containerPort: 80
            - containerPort: 443
      volumes:
        - name: tls
          secret:
            secretName: tls-secret
---
apiVersion: v1
kind: Service
metadata:
  name: canary
spec:
  selector:
    app: canary
  ports:
    - protocol: TCP
      name: http
      port: 80
      targetPort: 80
    - protocol: TCP
      port: 443
      name: https
      targetPort: 443

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: canary2
  template:
    metadata:
      labels:
        app: canary2
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          args:
            - "--verbose"
          env:
            - name: WHOAMI_NAME
              value: canary2
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: canary2
spec:
  selector:
    app: canary2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
