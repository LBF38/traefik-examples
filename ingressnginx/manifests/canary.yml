apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "50"
    nginx.ingress.kubernetes.io/canary-by-cookie: "foo"
    # nginx.ingress.kubernetes.io/affinity-canary-behavior: "legacy"
    # nginx.ingress.kubernetes.io/session-cookie-name: "foo"
spec:
  ingressClassName: nginx
  rules:
    - host: cert.localhost
      http:
        paths:
          - path: /cert
            pathType: Prefix
            backend:
              service:
                name: canary
                port:
                  number: 80
          # - path: /2
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: canary2
          #       port:
          #         number: 80
  # tls:
  #   - hosts:
  #       - production.localhost
  #     secretName: tls-secret


