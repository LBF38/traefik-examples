apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "50"
    # nginx.ingress.kubernetes.io/canary-by-header: "Toto"
spec:
  ingressClassName: nginx
  rules:
    - host: production.localhost
      http:
        paths:
          - path: /1
            pathType: Prefix
            backend:
              service:
                name: canary
                port:
                  number: 80
    - host: production.localhost
      http:
        paths:
          - path: /2
            pathType: Prefix
            backend:
              service:
                name: canary2
                port:
                  number: 80
    # - host: other.localhost
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: canary
    #             port:
    #               number: 80
  # tls:
  #   - hosts:
  #       - production.localhost
  #     secretName: tls-secret

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canary
spec:
  replicas: 2
  selector:
    matchLabels:
      app: canary
  template:
    metadata:
      labels:
        app: canary
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          args:
            - "--verbose"
          env:
            - name: WHOAMI_NAME
              value: canary
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: canary
spec:
  selector:
    app: canary
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
