apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp
  annotations:
    # These NGINX annotations are automatically translated by Traefik
    #nginx.ingress.kubernetes.io/app-root: /test
    nginx.ingress.kubernetes.io/default-backend: defaultbackend2
    #nginx.ingress.kubernetes.io/custom-http-errors: "500"
    #nginx.ingress.kubernetes.io/configuration-snippet: |
#   nginx.ingress.kubernetes.io/server-snippet: |
#     proxy_set_header X-Path A;
#     add_header X-Path A;
#   
#   nginx.ingress.kubernetes.io/auth-url: http://test
#   nginx.ingress.kubernetes.io/auth-signin: "http://$host/juliens"
#   nginx.ingress.kubernetes.io/server-snippet: |
#     more_set_headers 'X-MyHeaderSet:   C i ';
#     more_set_headers 'X-MyHeaderSet2: C';
#     
#     add_header X-MyHeaderAdd ${http_toto};
#     add_header X-MyHeaderAdd2 C;
#     location /pathC {
#       proxy_pass http://upstream_balancer;
#     }
spec:
  ingressClassName: nginx # ← Traefik will watch this class
  defaultBackend:
    service:
      name: defaultbackend3
      port:
        number: 80
  rules:
    - host: whoami.localhost
      http:
        paths:
          - path: /pathA
            pathType: Prefix
            backend:
              service:
                name: myapp
                port:
                  number: 80
