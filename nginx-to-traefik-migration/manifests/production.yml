apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: production
  annotations:
    nginx.ingress.kubernetes.io/temporal-redirect: https://traefik.io
spec:
  ingressClassName: nginx
  # defaultBackend:
  #   service:
  #     name: canary2
  #     port:
  #       number: 80
  rules:
    - host: production.localhost
      http:
        paths:
          - path: /1
            pathType: Prefix
            backend:
              service:
                name: production
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: production2
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: https://google.com
spec:
  ingressClassName: nginx
  # defaultBackend:
  #   service:
  #     name: canary2
  #     port:
  #       number: 80
  rules:
    - host: production.localhost
      http:
        paths:
          - path: /2
            pathType: Prefix
            backend:
              service:
                name: production
                port:
                  number: 80
    # - host: other.localhost
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: production
    #             port:
    #               number: 80
  # tls:
  #   - hosts:
  #       - production.localhost
  #     secretName: tls-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: production
  template:
    metadata:
      labels:
        app: production
    spec:
      containers:
        - name: whoami
          image: traefik/whoami
          args:
            - "--verbose"
          env:
            - name: WHOAMI_NAME
              value: production
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: production
spec:
  selector:
    app: production
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
